apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: service-churn-dashboard
  namespace: service-churn-dev
  annotations:
    haproxy.router.openshift.io/timeout: 300s
spec:
  to:
    kind: Service
    name: service-churn-dashboard
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect