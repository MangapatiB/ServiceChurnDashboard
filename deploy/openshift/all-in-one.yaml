apiVersion: v1
kind: Secret
metadata:
  name: service-churn-dashboard-secret
  namespace: service-churn-dev
type: Opaque
stringData:
  SECRET_KEY: "change-me"
  DATABRICKS_TOKEN: "replace-with-databricks-token"
  MODEM_SQL_USERNAME: "replace-with-sql-username"
  MODEM_SQL_PASSWORD: "replace-with-sql-password"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-churn-dashboard-config
  namespace: service-churn-dev
data:
  DATA_SOURCE_MODE: "live"
  REFRESH_SECONDS: "60"
  HIGH_RISK_LIMIT: "12"

  DATABRICKS_HOST: "https://adb-2499533172944623.3.azuredatabricks.net"
  DATABRICKS_WAREHOUSE_ID: "926835bd268bdeb0"
  DATABRICKS_SQL_QUERY_FILE: "/app/queries/service_churn_dashboard.sql"

  MODEM_HEALTH_REFRESH_SECONDS: "3600"
  MODEM_SQL_SERVER: "sql-productdbu.uat.corp.cableone.net"
  MODEM_SQL_PORT: "1433"
  MODEM_SQL_TIMEOUT_SECONDS: "5"
  MODEM_SQL_DATABASE: "newbacondata"
  MODEM_SQL_DRIVER: "ODBC Driver 18 for SQL Server"
  MODEM_SQL_SCHEMA: "dbo"
  MODEM_SQL_TABLE: "cmdata2011"
  MODEM_SQL_ENCRYPT: "no"
  MODEM_SQL_TRUST_SERVER_CERTIFICATE: "yes"

  LOG_DIR: "/tmp/logs"
  LOG_LEVEL: "INFO"
  LOG_BACKUP_COUNT: "14"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-churn-dashboard
  namespace: service-churn-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-churn-dashboard
  template:
    metadata:
      labels:
        app: service-churn-dashboard
    spec:
      containers:
        - name: service-churn-dashboard
          image: image-registry.openshift-image-registry.svc:5000/service-churn-dev/service-churn-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: service-churn-dashboard-config
            - secretRef:
                name: service-churn-dashboard-secret
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: service-churn-dashboard
  namespace: service-churn-dev
spec:
  selector:
    app: service-churn-dashboard
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: service-churn-dashboard
  namespace: service-churn-dev
spec:
  to:
    kind: Service
    name: service-churn-dashboard
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect