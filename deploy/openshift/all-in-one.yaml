apiVersion: v1
kind: Secret
metadata:
  name: service-churn-dashboard-secret
  namespace: service-churn-dev
type: Opaque
stringData:
  SECRET_KEY: "change-me"
  DASHBOARD_SQL_USERNAME: "replace-with-dashboard-sql-username"
  DASHBOARD_SQL_PASSWORD: "replace-with-dashboard-sql-password"
  MODEM_SQL_USERNAME: "replace-with-modem-sql-username"
  MODEM_SQL_PASSWORD: "replace-with-modem-sql-password"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-churn-dashboard-config
  namespace: service-churn-dev
data:
  DATA_SOURCE_MODE: "live"
  REFRESH_SECONDS: "60"
  HIGH_RISK_LIMIT: "12"
  MAX_DASHBOARD_LIMIT: "1000"

  DASHBOARD_SQL_SERVER: "sql-uatproduct.uat.corp.cableone.net"
  DASHBOARD_SQL_PORT: "1433"
  DASHBOARD_SQL_TIMEOUT_SECONDS: "15"
  DASHBOARD_SQL_BATCH_SIZE: "500"
  DASHBOARD_SQL_DATABASE: "ServiceChurnDashboard"
  DASHBOARD_SQL_DRIVER: "ODBC Driver 18 for SQL Server"
  DASHBOARD_SQL_SCHEMA: "dbo"
  DASHBOARD_SQL_ENCRYPT: "yes"
  DASHBOARD_SQL_TRUST_SERVER_CERTIFICATE: "yes"
  DASHBOARD_SQL_TRUCKROLL_TABLE: "service_churn_truckroll_base"
  DASHBOARD_SQL_RES_CHURN_TABLE: "service_churn_res_latest"
  DASHBOARD_SQL_COM_CHURN_TABLE: "service_churn_com_latest"
  DASHBOARD_SQL_CALL_MONTHLY_TABLE: "service_churn_call_monthly_agg"
  DASHBOARD_SQL_CALL_RECORDS_TABLE: "service_churn_call_records_monthly"
  DASHBOARD_SQL_ACCOUNT_MAC_TABLE: "service_churn_account_mac_map"
  DASHBOARD_SQL_MODEM_HEALTH_TABLE: "service_churn_modem_health_latest"

  MODEM_HEALTH_REFRESH_SECONDS: "3600"
  MODEM_SQL_SERVER: "sql-productdbu.uat.corp.cableone.net"
  MODEM_SQL_PORT: "1433"
  MODEM_SQL_TIMEOUT_SECONDS: "5"
  MODEM_SQL_DATABASE: "newbacondata"
  MODEM_SQL_DRIVER: "ODBC Driver 18 for SQL Server"
  MODEM_SQL_SCHEMA: "dbo"
  MODEM_SQL_TABLE: "cmdata2011"
  MODEM_SQL_ENCRYPT: "no"
  MODEM_SQL_TRUST_SERVER_CERTIFICATE: "yes"

  LOG_DIR: "/tmp/logs"
  LOG_LEVEL: "INFO"
  LOG_BACKUP_COUNT: "14"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-churn-dashboard
  namespace: service-churn-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-churn-dashboard
  template:
    metadata:
      labels:
        app: service-churn-dashboard
    spec:
      containers:
        - name: service-churn-dashboard
          image: image-registry.openshift-image-registry.svc:5000/service-churn-dev/service-churn-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: service-churn-dashboard-config
            - secretRef:
                name: service-churn-dashboard-secret
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: service-churn-dashboard
  namespace: service-churn-dev
spec:
  selector:
    app: service-churn-dashboard
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: service-churn-dashboard
  namespace: service-churn-dev
spec:
  to:
    kind: Service
    name: service-churn-dashboard
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: service-churn-dashboard-scheduler
  namespace: service-churn-dev
spec:
  schedule: "0 19 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: service-churn-dashboard-scheduler
              image: image-registry.openshift-image-registry.svc:5000/service-churn-dev/service-churn-dashboard:latest
              imagePullPolicy: Always
              command:
                - sh
                - -c
                - |
                  set -e
                  cd /app/schedular
                  for file in run_*.py; do
                    echo "Running $file"
                    python "$file"
                  done
              envFrom:
                - configMapRef:
                    name: service-churn-dashboard-config
                - secretRef:
                    name: service-churn-dashboard-secret
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 2Gi